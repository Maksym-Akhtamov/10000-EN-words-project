<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WordFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0c0f14;
      --surface:   #141820;
      --surface2:  #1c2230;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --text:      #e8eaf0;
      --muted:     #5a6278;
      --accent:    #4f8ef7;
      --accent2:   #6ee7c0;
      --correct:   #4ade80;
      --wrong:     #f87171;
      --gold:      #fbbf24;
      --radius:    18px;
      --shadow:    0 20px 60px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(110,231,192,0.06) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 260px 1fr 220px;
      gap: 24px;
      max-width: 1160px;
      margin: 0 auto;
      padding: 32px 20px;
      align-items: start;
    }

    /* ===== PANELS ===== */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .panel-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    /* ===== SETS GRID ===== */
    #sets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .set-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .set-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(79,142,247,0.1); }
    .set-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .set-btn.done { border-color: var(--correct); color: var(--correct); }
    .set-btn.done.active { background: var(--correct); color: #000; }

    /* ===== CUSTOM SETS ===== */
    #customSetsPanel { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

    .custom-set-btn {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .custom-set-btn:hover { background: rgba(251,191,36,0.15); }
    .custom-set-btn.active { background: rgba(251,191,36,0.2); border-color: var(--gold); }

    /* ===== MODE DROPDOWN ===== */
    .dropdown-wrap { position: relative; margin-top: 16px; }

    .dropdown-trigger {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
    }
    .dropdown-trigger:hover { border-color: var(--accent); }
    .dropdown-trigger .arrow { transition: transform 0.2s; font-size: 10px; color: var(--muted); }
    .dropdown-wrap.open .arrow { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
    }
    .dropdown-wrap.open .dropdown-menu {
      opacity: 1; visibility: visible; transform: translateY(0);
    }

    .dropdown-item {
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .dropdown-item .icon { font-size: 16px; width: 20px; }

    /* ===== LANG SETTING ===== */
    .lang-setting { margin-top: 16px; }
    .lang-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .lang-btns { display: flex; gap: 6px; }
    .lang-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--border2); }
    .lang-btn.active { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }

    /* ===== MAIN CONTENT ===== */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* ===== COUNTER ===== */
    .counter {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    /* ===== CARD ===== */
    .card-wrap {
      width: 100%;
      max-width: 520px;
      perspective: 1200px;
      position: relative;
    }

    .card {
      width: 100%;
      height: 300px;
      cursor: pointer;
      position: relative;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 24px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-face::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .card-front {
      background: var(--surface);
      border: 1px solid var(--border2);
    }

    .card-back {
      background: linear-gradient(135deg, #0d2b1e 0%, #0e2a2a 100%);
      border: 1px solid rgba(110,231,192,0.2);
      transform: rotateY(180deg);
    }

    .card-word {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      color: var(--text);
      text-align: center;
      line-height: 1.2;
    }

    /* Translation layout on back */
    .trans-layout {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
    }

    .trans-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .trans-lang-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(110,231,192,0.5);
      font-weight: 600;
    }

    .trans-word {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--accent2);
      text-align: center;
      line-height: 1.4;
    }

    .trans-single {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: var(--accent2);
      text-align: center;
      line-height: 1.4;
    }

    .trans-divider {
      width: 1px;
      background: rgba(110,231,192,0.15);
      align-self: stretch;
      margin-top: 24px;
    }

    /* Card icons */
    .card-icon {
      position: absolute;
      top: 16px;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .card-icon:hover { background: rgba(255,255,255,0.12); color: var(--text); border-color: var(--border2); transform: scale(1.1); }
    .star-btn { right: 16px; }
    .audio-btn { left: 16px; }
    .star-btn.starred { color: var(--gold); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.1); }

    /* ===== CHOICE OPTIONS ===== */
    #testOptions {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }

    .choice-btn {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .choice-btn:hover:not(.disabled) { background: rgba(79,142,247,0.1); border-color: var(--accent); color: var(--text); }
    .choice-btn.correct-ans { background: rgba(74,222,128,0.12) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
    .choice-btn.wrong-ans  { background: rgba(248,113,113,0.12) !important; border-color: var(--wrong) !important; color: var(--wrong) !important; }
    .choice-btn.disabled { opacity: 0.45; cursor: default; }

    /* ===== RESULT FEEDBACK ===== */
    #result {
      font-size: 15px;
      font-weight: 600;
      min-height: 24px;
      text-align: center;
      letter-spacing: 0.02em;
      transition: all 0.2s;
    }
    #result.correct { color: var(--correct); }
    #result.wrong   { color: var(--wrong); }

    /* ===== INPUT AREA ===== */
    #inputArea {
      display: none;
      width: 100%;
      max-width: 520px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #answerInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      padding: 13px 20px;
      border-radius: 14px;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
    }
    #answerInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    #answerInput.input-correct { border-color: var(--correct); }
    #answerInput.input-wrong   { border-color: var(--wrong); animation: shake 0.3s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #checkBtn {
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 13px 24px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #checkBtn:hover { background: #3b7de8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.3); }

    /* ===== NAV ===== */
    .nav-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); transform: scale(1.08); }

    /* ===== BOTTOM SETTINGS ===== */
    .bottom-settings {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .setting-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .setting-btn:hover { border-color: var(--border2); color: var(--text); }
    .setting-btn.active { background: rgba(79,142,247,0.12); border-color: var(--accent); color: var(--accent); }

    /* ===== RIGHT SIDEBAR ===== */
    .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ctrl-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
    .ctrl-btn.active { background: rgba(79,142,247,0.12); border-color: var(--accent); color: var(--accent); }

    .auto-row { display: flex; gap: 8px; }
    #autoBtn { flex: 1; }

    .mini-dropdown { position: relative; width: 60px; flex-shrink: 0; }
    .mini-trigger {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .mini-trigger:hover { border-color: var(--border2); color: var(--text); }

    .mini-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      z-index: 50;
      opacity: 0; visibility: hidden;
      transform: translateY(6px);
      transition: all 0.18s;
    }
    .mini-dropdown.open .mini-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .mini-option { padding: 9px 14px; font-size: 13px; cursor: pointer; }
    .mini-option:hover { background: rgba(255,255,255,0.05); }

    .btn-clear {
      background: rgba(248,113,113,0.08) !important;
      border-color: rgba(248,113,113,0.2) !important;
      color: var(--wrong) !important;
      display: none;
    }
    .btn-clear:hover { background: rgba(248,113,113,0.15) !important; }

    #regenBtn { display: none; }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-wrap {
      width: 100%;
      max-width: 520px;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes popIn {
      0% { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .card-wrap { animation: popIn 0.35s ease; }

    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Card flip animation enhancement */
    .card-inner.animate-flip {
      animation: none;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
      .main { order: 1; }
      .sidebar-right { order: 2; flex-direction: row; flex-wrap: wrap; }
      .sidebar-right > * { flex: 1 1 120px; }
      .sidebar-left { order: 3; }
      .card { height: 240px; }
      .card-word { font-size: 32px; }
      #sets { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div class="panel">
      <div class="panel-title">Sets</div>
      <div id="sets"></div>
      <div id="customSetsPanel"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Mode</div>
      <div class="dropdown-wrap" id="modeDropdown">
        <button class="dropdown-trigger" onclick="toggleModeDropdown()">
          <span id="modeTriggerLabel">📖 Study</span>
          <span class="arrow">▼</span>
        </button>
        <div class="dropdown-menu">
          <div class="dropdown-item" onclick="selectMode('study')">  <span class="icon">📖</span> Study</div>
          <div class="dropdown-item" onclick="selectMode('choice')"> <span class="icon">🎯</span> Choice</div>
          <div class="dropdown-item" onclick="selectMode('audio')">  <span class="icon">🔊</span> Audio</div>
          <div class="dropdown-item" onclick="selectMode('ai')">     <span class="icon">⚡</span> AI Mode</div>
        </div>
      </div>

      <div class="lang-setting">
        <div class="lang-label">Translation Language</div>
        <div class="lang-btns">
          <button class="lang-btn active" id="langBothBtn" onclick="setLang('both')">Both</button>
          <button class="lang-btn" id="langUkBtn"   onclick="setLang('uk')">UK</button>
          <button class="lang-btn" id="langRuBtn"   onclick="setLang('ru')">RU</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="counter" id="counter"></div>

    <div class="card-wrap">
      <div class="card" id="card" onclick="flipCard()">
        <button class="card-icon star-btn" id="starBtn"
                onclick="event.stopPropagation(); toggleStar()">☆</button>
        <button class="card-icon audio-btn" id="audioBtn"
                onclick="event.stopPropagation(); speakCurrent()">🔊</button>
        <div class="card-inner" id="cardInner">
          <div class="card-face card-front" id="front"></div>
          <div class="card-face card-back"  id="back"></div>
        </div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <div id="testOptions"></div>

    <div id="result"></div>

    <div id="inputArea">
      <div class="input-row">
        <input id="answerInput" type="text" placeholder="Type the English word…"/>
        <button id="checkBtn" onclick="checkAnswer()">Check</button>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevWord()">←</button>
      <button class="nav-btn" onclick="nextWord()">→</button>
    </div>

    <div class="bottom-settings" id="bottomSettings">
      <button class="setting-btn" id="dirBtn" onclick="toggleDir()">EN → Translation</button>
      <button class="setting-btn" id="kbBtn"  onclick="toggleKeyboard()">⌨ Keyboard</button>
    </div>
  </main>

  <!-- RIGHT SIDEBAR -->
  <aside class="sidebar-right">
    <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle</button>

    <div class="auto-row">
      <button class="ctrl-btn" id="autoBtn" onclick="toggleAuto()">▶ Auto</button>
      <div class="mini-dropdown" id="delayDropdown">
        <button class="mini-trigger" id="delayTrigger" onclick="toggleDelayDropdown()">3s</button>
        <div class="mini-menu">
          <div class="mini-option" onclick="setDelay(1)">1s</div>
          <div class="mini-option" onclick="setDelay(2)">2s</div>
          <div class="mini-option" onclick="setDelay(3)">3s</div>
          <div class="mini-option" onclick="setDelay(5)">5s</div>
        </div>
      </div>
    </div>

    <button class="ctrl-btn btn-clear" id="clearBtn" onclick="clearCustomSet()">🗑 Clear Review</button>
    <button class="ctrl-btn" id="regenBtn" onclick="regenerateAI()">🔄 Regen AI</button>
  </aside>

</div>

<script>
// ===================== STATE =====================
let sets = [];
let currentSet = 0;
let current = 0;
let flipped = false;
let shuffleOn = false;
let order = [];
let customSets = JSON.parse(localStorage.getItem("customSets") || "[]");
let isAnswerLocked = false;  // true only when correct
let autoPlay = false;
let autoTimer = null;
let autoDelay = 3;
let activeMode = "study"; // study | choice | audio | ai
let direction = "en-ru";  // en-ru | ru-en
let keyboardOn = false;
let langMode = "both";     // both | uk | ru
let completedSets = [];
let filterMode = "all";
let currentCustomSet = null;
let aiTasks = [];
let aiTasksCache = {};
let frozenOrder = null;   // locked shuffle order — not changed by star actions

// ===================== INIT =====================
async function init() {
  loadCompletion();
  const res = await fetch("words.json");
  const data = await res.json();
  let gid = 1;
  sets = data.sets.map(s => ({ ...s, words: s.words.map(w => ({ ...w, id: gid++ })) }));
  initOrder();
  renderSets();
  renderCustomSets();
  render();
  updateAllUI();
}

// ===================== ORDER =====================
function initOrder(preserveOrder = false) {
  const words = getWords();
  if (preserveOrder && frozenOrder !== null) {
    // Rebuild order from frozenOrder, keeping only valid indices
    order = frozenOrder.filter(i => i < words.length);
    return;
  }
  order = words.map((_, i) => i);
  if (shuffleOn) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  frozenOrder = [...order];
}

// ===================== DATA =====================
function getWords() {
  if (filterMode === "custom" && currentCustomSet !== null && customSets[currentCustomSet]) {
    const all = sets.flatMap(s => s.words);
    return all.filter(w => customSets[currentCustomSet].words.includes(w.id));
  }
  return sets[currentSet]?.words || [];
}

function getTranslation(word) {
  if (langMode === "uk") return word.uk;
  if (langMode === "ru") return word.ru;
  return null; // means "both"
}

// ===================== RENDER =====================
function render() {
  const words = getWords();

  document.getElementById("counter").textContent =
    words.length ? `${current + 1} / ${order.length}` : "";

  // Progress bar
  const pct = words.length ? ((current + 1) / order.length * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";

  if (!words.length) {
    document.getElementById("front").innerHTML = `<span style="color:var(--muted);font-size:18px">No words</span>`;
    document.getElementById("back").innerHTML = "";
    return;
  }

  const word = words[order[current]];
  const inner = document.getElementById("cardInner");
  inner.classList.remove("flipped");
  flipped = false;

  document.getElementById("result").textContent = "";
  document.getElementById("result").className = "";
  isAnswerLocked = false;

  // Star
  const starBtn = document.getElementById("starBtn");
  const inCustom = isWordStarred(word.id);
  starBtn.textContent = inCustom ? "⭐" : "☆";
  starBtn.className = "card-icon star-btn" + (inCustom ? " starred" : "");

  if (activeMode === "audio") {
    renderAudioMode(word);
  } else if (activeMode === "ai") {
    renderAIMode(word);
  } else if (activeMode === "choice") {
    renderChoiceMode(word, words);
  } else {
    renderStudyMode(word);
  }

  updateAllUI();
}

function renderStudyMode(word) {
  const front = document.getElementById("front");
  const back  = document.getElementById("back");

  if (direction === "en-ru") {
    front.innerHTML = `<div class="card-word">${word.en}</div>`;
    back.innerHTML  = buildTransHTML(word);
  } else {
    front.innerHTML = buildTransHTML(word);
    back.innerHTML  = `<div class="card-word">${word.en}</div>`;
  }
}

function buildTransHTML(word) {
  if (langMode === "uk") {
    return `<div class="trans-single">${word.uk}</div>`;
  }
  if (langMode === "ru") {
    return `<div class="trans-single">${word.ru}</div>`;
  }
  // Both — two columns
  return `
    <div class="trans-layout">
      <div class="trans-col">
        <div class="trans-lang-label">UA</div>
        <div class="trans-word">${word.uk}</div>
      </div>
      <div class="trans-divider"></div>
      <div class="trans-col">
        <div class="trans-lang-label">RU</div>
        <div class="trans-word">${word.ru}</div>
      </div>
    </div>`;
}

function renderAudioMode(word) {
  document.getElementById("front").innerHTML =
    `<div style="font-size:52px;opacity:.7">🔊</div>`;
  document.getElementById("back").innerHTML = buildTransHTML(word);
  setTimeout(() => speak(word.en), 250);
}

function renderChoiceMode(word, words) {
  const trans = langMode === "uk" ? word.uk : langMode === "ru" ? word.ru : `${word.uk} / ${word.ru}`;
  document.getElementById("front").innerHTML = `<div class="card-word" style="font-size:30px">${trans}</div>`;
  document.getElementById("back").innerHTML = "";
  renderChoiceOptions(word, words);
}

function renderChoiceOptions(word, words) {
  const container = document.getElementById("testOptions");
  container.innerHTML = "";
  container.style.display = "grid";

  const opts = generateOptions(word, words);
  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = opt;
    btn.dataset.val = opt;
    btn.onclick = () => handleChoice(opt, word.en, container);
    container.appendChild(btn);
  });
}

function handleChoice(selected, correct, container) {
  // Don't lock on wrong — allow retry, but show which was wrong
  const allBtns = container.querySelectorAll(".choice-btn");

  allBtns.forEach(b => {
    if (b.dataset.val === correct) {
      b.classList.add("correct-ans");
    } else if (b.dataset.val === selected && selected !== correct) {
      b.classList.add("wrong-ans");
    }
    if (b.dataset.val !== selected || selected === correct) {
      // Only disable if answered correctly
    }
  });

  if (selected === correct) {
    showResult("✓ Correct!", "correct");
    isAnswerLocked = true;
    // Disable all after correct
    allBtns.forEach(b => b.classList.add("disabled"));
    allBtns.forEach(b => b.onclick = null);
    if (!autoPlay) setTimeout(() => nextWord(), 700);
  } else {
    showResult(`✗ Try again`, "wrong");
    // Remove wrong class after a moment to allow retry
    setTimeout(() => {
      allBtns.forEach(b => {
        if (b.dataset.val === selected) b.classList.remove("wrong-ans");
      });
      showResult("", "");
    }, 900);
  }
}

function generateOptions(correctWord, words) {
  const pool = words
    .map(w => w.en)
    .filter(w => w !== correctWord.en);
  // Shuffle pool
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const opts = [correctWord.en, ...pool.slice(0, 3)];
  // Shuffle opts
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return opts;
}

function renderAIMode(word) {
  const front = document.getElementById("front");
  const back  = document.getElementById("back");
  const container = document.getElementById("testOptions");

  if (aiTasks === null) {
    front.innerHTML = `<div style="color:var(--muted);font-size:18px">⏳ Generating…</div>`;
    back.innerHTML = ""; container.innerHTML = "";
    return;
  }

  const task = aiTasks.find(t => t.word === word.en && t.setId === sets[currentSet].id);
  if (!task) {
    front.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center">
        <div style="color:var(--muted);font-size:17px">No AI tasks for this set</div>
        <button onclick="event.stopPropagation();startAIGeneration()" 
          style="background:var(--accent);color:#fff;padding:12px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer">
          ⚡ Generate AI
        </button>
      </div>`;
    back.innerHTML = ""; container.innerHTML = "";
    return;
  }

  front.innerHTML = `<div class="card-word" style="font-size:22px;line-height:1.5">${task.sentence}</div>`;
  back.innerHTML = "";
  container.innerHTML = "";
  container.style.display = "grid";

  const shuffled = [...task.options].sort(() => Math.random() - 0.5);
  shuffled.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = opt;
    btn.dataset.val = opt;
    btn.onclick = () => handleAIChoice(opt, task.correct, container);
    container.appendChild(btn);
  });
}

function handleAIChoice(selected, correct, container) {
  const allBtns = container.querySelectorAll(".choice-btn");
  allBtns.forEach(b => {
    if (b.dataset.val === correct) b.classList.add("correct-ans");
    else if (b.dataset.val === selected && selected !== correct) b.classList.add("wrong-ans");
  });

  if (selected === correct) {
    showResult("✓ Correct!", "correct");
    isAnswerLocked = true;
    allBtns.forEach(b => { b.classList.add("disabled"); b.onclick = null; });
    if (!autoPlay) setTimeout(() => nextWord(), 700);
  } else {
    showResult("✗ Try again", "wrong");
    setTimeout(() => {
      allBtns.forEach(b => { if (b.dataset.val === selected) b.classList.remove("wrong-ans"); });
      showResult("", "");
    }, 900);
  }
}

function showResult(text, cls) {
  const el = document.getElementById("result");
  el.textContent = text;
  el.className = cls;
}

// ===================== NAVIGATION =====================
function nextWord() {
  if (!order.length) return;
  current = (current + 1) % order.length;
  render();
  if (keyboardOn) {
    const inp = document.getElementById("answerInput");
    inp.value = "";
    inp.className = "";
    inp.focus();
  }
}

function prevWord() {
  if (!order.length) return;
  current = (current - 1 + order.length) % order.length;
  render();
}

// ===================== FLIP =====================
function flipCard() {
  if (activeMode === "choice" || activeMode === "ai" || activeMode === "audio") return;
  flipped = !flipped;
  document.getElementById("cardInner").classList.toggle("flipped", flipped);
}

// ===================== KEYBOARD =====================
function handleEnter() {
  if (!isAnswerLocked) checkAnswer();
  else { nextWord(); }
}

function checkAnswer() {
  const inp = document.getElementById("answerInput");
  const val = inp.value.trim().toLowerCase();
  const words = getWords();
  const correct = words[order[current]].en.toLowerCase();

  if (val === correct) {
    inp.className = "input-correct";
    showResult("✓ Correct!", "correct");
    isAnswerLocked = true;
    if (!autoPlay) setTimeout(() => {
      nextWord();
      inp.className = "";
    }, 700);
  } else {
    inp.className = "input-wrong";
    showResult(`✗  ${correct}`, "wrong");
    setTimeout(() => { inp.className = ""; }, 400);
  }
}

// ===================== MODES =====================
function selectMode(m) {
  activeMode = m;
  document.getElementById("modeDropdown").classList.remove("open");
  const labels = { study: "📖 Study", choice: "🎯 Choice", audio: "🔊 Audio", ai: "⚡ AI Mode" };
  document.getElementById("modeTriggerLabel").textContent = labels[m];

  if (m !== "study") { keyboardOn = false; }
  if (m === "ai") loadAITasks();

  current = 0;
  initOrder();
  render();
}

function toggleModeDropdown() {
  document.getElementById("modeDropdown").classList.toggle("open");
}

function toggleDir() {
  direction = direction === "en-ru" ? "ru-en" : "en-ru";
  document.getElementById("dirBtn").textContent =
    direction === "en-ru" ? "EN → Translation" : "Translation → EN";
  document.getElementById("dirBtn").classList.toggle("active", direction === "ru-en");
  render();
}

function toggleKeyboard() {
  if (direction !== "ru-en" && activeMode === "study") {
    alert("Switch direction to Translation → EN first");
    return;
  }
  keyboardOn = !keyboardOn;
  document.getElementById("kbBtn").classList.toggle("active", keyboardOn);
  render();
}

function setLang(l) {
  langMode = l;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`lang${l.charAt(0).toUpperCase()+l.slice(1)}Btn`).classList.add("active");
  render();
}

// ===================== SHUFFLE =====================
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  frozenOrder = null; // reset frozen
  current = 0;
  initOrder();
  document.getElementById("shuffleBtn").classList.toggle("active", shuffleOn);
  document.getElementById("shuffleBtn").textContent = shuffleOn ? "🔀 Shuffle ON" : "🔀 Shuffle";
  render();
}

// ===================== AUTO =====================
function toggleAuto() {
  autoPlay = !autoPlay;
  autoPlay ? startAuto() : stopAuto();
  document.getElementById("autoBtn").classList.toggle("active", autoPlay);
  document.getElementById("autoBtn").textContent = autoPlay ? `▶ Auto ${autoDelay}s` : "▶ Auto";
}

function startAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => nextWord(), autoDelay * 1000);
}

function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
}

function setDelay(s) {
  autoDelay = s;
  document.getElementById("delayTrigger").textContent = s + "s";
  document.getElementById("delayDropdown").classList.remove("open");
  if (autoPlay) startAuto();
  if (autoPlay) document.getElementById("autoBtn").textContent = `▶ Auto ${autoDelay}s`;
}

function toggleDelayDropdown() {
  document.getElementById("delayDropdown").classList.toggle("open");
}

// ===================== SETS =====================
function renderSets() {
  const c = document.getElementById("sets");
  c.innerHTML = "";
  sets.forEach((set, idx) => {
    if (filterMode === "notDone" && completedSets.includes(set.id)) return;
    const btn = document.createElement("button");
    btn.className = "set-btn" +
      (idx === currentSet ? " active" : "") +
      (completedSets.includes(set.id) ? " done" : "");
    btn.textContent = set.id;
    btn.onclick = () => selectSet(idx);
    c.appendChild(btn);
  });
}

function selectSet(idx) {
  currentSet = idx;
  current = 0;
  filterMode = "all";
  currentCustomSet = null;
  frozenOrder = null;
  if (activeMode === "ai") {
    const cached = loadAICache();
    aiTasks = cached || [];
  }
  initOrder();
  renderSets();
  render();
}

// ===================== STAR / CUSTOM =====================
function isWordStarred(id) {
  return customSets.some(s => s.words.includes(id));
}

function toggleStar() {
  const word = getWords()[order[current]];
  if (!word) return;
  const id = word.id;

  if (isWordStarred(id)) {
    customSets.forEach(s => { s.words = s.words.filter(x => x !== id); });
    customSets = customSets.filter(s => s.words.length > 0);
  } else {
    if (!customSets.length) customSets.push({ id: 1, words: [] });
    let target = customSets.find(s => s.words.length < 50);
    if (!target) { target = { id: customSets.length + 1, words: [] }; customSets.push(target); }
    target.words.push(id);
  }

  localStorage.setItem("customSets", JSON.stringify(customSets));
  renderCustomSets();

  // Update star WITHOUT re-initialising order
  const starBtn = document.getElementById("starBtn");
  const nowStarred = isWordStarred(id);
  starBtn.textContent = nowStarred ? "⭐" : "☆";
  starBtn.className = "card-icon star-btn" + (nowStarred ? " starred" : "");
}

function renderCustomSets() {
  const c = document.getElementById("customSetsPanel");
  c.innerHTML = "";
  customSets.forEach((set, idx) => {
    const btn = document.createElement("button");
    btn.className = "custom-set-btn" + (idx === currentCustomSet && filterMode === "custom" ? " active" : "");
    btn.textContent = `⭐ Review ${idx + 1} (${set.words.length})`;
    btn.onclick = () => openCustomSet(idx);
    c.appendChild(btn);
  });
}

function openCustomSet(idx) {
  currentCustomSet = idx;
  filterMode = "custom";
  current = 0;
  frozenOrder = null;
  initOrder();
  render();
  renderCustomSets();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function clearCustomSet() {
  if (currentCustomSet === null || !confirm("Clear this Review set?")) return;
  customSets.splice(currentCustomSet, 1);
  currentCustomSet = null;
  filterMode = "all";
  localStorage.setItem("customSets", JSON.stringify(customSets));
  initOrder(); render(); renderCustomSets(); updateAllUI();
}

// ===================== COMPLETION =====================
function loadCompletion() {
  const s = localStorage.getItem("completedSets");
  if (s) completedSets = JSON.parse(s);
}

// ===================== SPEAK =====================
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.9;
  speechSynthesis.speak(u);
}

function speakCurrent() {
  const words = getWords();
  if (!words.length) return;
  speak(words[order[current]].en);
}

// ===================== AI =====================
function getAIKey() { return `aiTasks_set_${sets[currentSet].id}`; }

function loadAICache() {
  const key = getAIKey();
  if (aiTasksCache[key]) return aiTasksCache[key];
  const s = localStorage.getItem(key);
  if (s) { try { const p = JSON.parse(s); aiTasksCache[key] = p; return p; } catch(e){} }
  return null;
}

function saveAICache(tasks) {
  const key = getAIKey();
  aiTasksCache[key] = tasks;
  localStorage.setItem(key, JSON.stringify(tasks));
}

async function loadAITasks() {
  const cached = loadAICache();
  if (cached) { aiTasks = cached; render(); return; }
  aiTasks = []; render();
}

async function generateAIBatch(words) {
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ words: words.map(w => w.en) })
  });
  if (!res.ok) throw new Error("Server " + res.status);
  return res.json();
}

async function startAIGeneration() {
  aiTasks = null; render();
  const words = getWords();
  const batches = [];
  for (let i = 0; i < words.length; i += 10) batches.push(words.slice(i, i + 10));
  try {
    const results = await Promise.all(batches.map(b => generateAIBatch(b)));
    const all = results.flat();
    if (!all.length) { aiTasks = []; render(); return; }
    const setId = sets[currentSet].id;
    aiTasks = all.map(t => ({ ...t, setId }));
    saveAICache(aiTasks);
    render();
  } catch(e) {
    console.error(e);
    aiTasks = []; render();
  }
}

function regenerateAI() {
  localStorage.removeItem(getAIKey());
  delete aiTasksCache[getAIKey()];
  startAIGeneration();
}

// ===================== UI STATE =====================
function updateAllUI() {
  const isTest = activeMode === "choice" || activeMode === "ai";
  const isAudio = activeMode === "audio";

  // testOptions visibility
  const to = document.getElementById("testOptions");
  if (!isTest) { to.style.display = "none"; to.innerHTML = ""; }

  // input area
  document.getElementById("inputArea").style.display =
    (keyboardOn || isAudio) ? "flex" : "none";

  // speak btn - hide in keyboard mode and choice/ai
  document.getElementById("audioBtn").style.display =
    (keyboardOn || isTest) ? "none" : "";

  // bottom settings - hide in test/audio/ai
  document.getElementById("bottomSettings").style.display =
    (isTest || isAudio) ? "none" : "";

  // clear btn
  document.getElementById("clearBtn").style.display =
    (filterMode === "custom") ? "block" : "none";

  // regen btn
  document.getElementById("regenBtn").style.display =
    activeMode === "ai" ? "block" : "none";
}

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener("keydown", e => {
  const tag = document.activeElement.tagName;
  const typing = tag === "INPUT" || tag === "TEXTAREA" || document.activeElement.isContentEditable;

  if (e.code === "ArrowRight") { e.preventDefault(); nextWord(); }
  if (e.code === "ArrowLeft")  { e.preventDefault(); prevWord(); }
  if (e.code === "Space" && !typing) { e.preventDefault(); flipCard(); }
  if (e.code === "Enter" && typing) { e.preventDefault(); handleEnter(); }
});

// ===================== CLOSE DROPDOWNS =====================
document.addEventListener("click", e => {
  if (!e.target.closest("#modeDropdown"))   document.getElementById("modeDropdown").classList.remove("open");
  if (!e.target.closest("#delayDropdown"))  document.getElementById("delayDropdown").classList.remove("open");
});

// Touch swipe
let touchStartX = 0;
document.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
document.addEventListener("touchend",   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx >  50) prevWord();
  if (dx < -50) nextWord();
});

init();
</script>
