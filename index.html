<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Cards</title>

  <style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 400px;
  width: 100%;
  text-align: center;
  padding: 20px;
}

/* ===== SIDEBAR ===== */
#sets {
  position: fixed;
  top: 20px;
  left: 20px;

  display: grid;
  grid-template-columns: repeat(5, 40px);
  gap: 6px;

  padding: 10px;
  background: #1a1a1a;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

#sets button {
  width: 40px;
  height: 40px;
  font-size: 12px;
  padding: 0;
  border-radius: 6px;
  background: #2c2c2c;
}

#sets button.active {
  background: #4caf50;
  transform: scale(1.1);
}

/* ===== CARD ===== */
.card {
  width: 100%;
  height: 220px;
  perspective: 1000px;
  cursor: pointer;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}

.flipped {
  transform: rotateY(180deg);
}

.side {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #222;
  border-radius: 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  padding: 20px;
  box-sizing: border-box;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
  background: #4caf50;
}

/* ===== BUTTONS ===== */
button {
  height: 42px;
  padding: 0 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #2a2a2a;
  color: white;
  font-size: 14px;
  transition: 0.2s;
  min-width: 120px;
}

button:hover {
  background: #3a3a3a;
  transform: translateY(-1px);
}

button:active {
  transform: scale(0.97);
}

button.icon {
  min-width: 60px;
}

button.primary {
  background: #ff9800;
  font-weight: bold;
}

#sets button {
  min-width: unset;
  width: 40px;
  height: 40px;
}

/* ===== GROUPS ===== */
.controls-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ===== SPECIAL BUTTONS ===== */
#modeBtn {
  background: #1976d2;
}

#keyboardBtn {
  background: #6a1b9a;
}

#shuffleBtn.active {
  background: #4caf50;
}

.done {
  background: #2196f3 !important;
}

/* ===== TEXT ===== */
#progress,
.counter {
  font-size: 14px;
  color: #aaa;
}

#progress {
  margin-bottom: 10px;
}

.counter {
  margin-top: 10px;
}

/* ===== FILTER ===== */
.filter button {
  background: #333;
}

.filter button.active {
  background: #4caf50;
}

/* ===== INPUT ===== */
.input-area {
  margin-top: 15px;
}

input {
  padding: 10px;
  width: 70%;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.result {
  margin-top: 10px;
  font-size: 16px;
}

.correct {
  color: #4caf50;
}

.wrong {
  color: #f44336;
}

/* ===== CUSTOM SETS ===== */
#customSetsPanel button.active {
  background: #f5c542;
  color: black;
  transform: scale(1.05);
}

/* ===== AUTO MENU ===== */
.auto-wrapper {
  position: relative;
  display: inline-block;
}

.auto-menu {
  position: absolute;
  bottom: 110%;
  left: 0;
  background: #2a2a2a;
  border-radius: 10px;
  padding: 6px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  z-index: 10;
}

.auto-menu button {
  background: #3a3a3a;
  border-radius: 6px;
  padding: 5px;
  min-width: auto;
}

.auto-menu button:hover {
  background: #f5c542;
  color: black;
}

.auto-menu button:first-child {
  background: #444;
  color: #ff6b6b;
}

.hidden {
  display: none;
}

#customSetsPanel {
  position: fixed;
  right: 10px;
  top: 100px;
  width: 120px;
}

/* ===== MOBILE ===== */
#menuBtn {
  display: none;
}

@media (max-width: 768px) {
  #customSetsPanel {
    position: static;
    margin-top: 15px;
    width: 100%;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
  }
}

@media (max-width: 768px) {
  #customSetsPanel button {
    min-width: auto;
    padding: 8px 12px;
    border-radius: 20px;
    background: #2a2a2a;
  }
}

@media (max-width: 768px) {

  #menuBtn {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    padding: 12px;
    font-size: 16px;
    background: #1976d2;
  }

  #sets {
    top: 0;
    left: -100%;
    width: 80%;
    height: 100%;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 20px;
    overflow-y: auto;
    transition: 0.3s;
    z-index: 1000;
  }

  #sets.open {
    left: 0;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- Sets -->
  <button id="menuBtn" onclick="toggleMenu()">📚 Sets</button>
  <div id="sets"></div>

  <!-- Карточка -->
  <div class="card" onclick="flipCard()">
    <div id="cardInner" class="inner">
      <div class="side" id="front"></div>
      <div class="side back" id="back"></div>
    </div>
  </div>

  <!-- Input -->
  <div id="inputArea" class="input-area" style="display:none;">
    <input id="answerInput" placeholder="Type answer..." />
    <button onclick="checkAnswer()">Check</button>
    <div id="result" class="result"></div>
  </div>

  <!-- Progress -->
  <div id="progress"></div>

  <!-- Filter -->
  <div class="controls-group">
    <button id="filterAll" onclick="setFilter('all')">All</button>
    <button id="filterNotDone" onclick="setFilter('notDone')">Not Done</button>
  </div>

  <!-- Navigation -->
  <div class="controls-group">
    <button onclick="prevWord()">←</button>
    <button onclick="nextWord()">→</button>
  </div>

  <!-- Modes -->
  <div class="controls-group">
    <button id="modeBtn" onclick="toggleMode()">Mode: EN → RU</button>
    <button id="keyboardBtn" onclick="toggleKeyboard()">⌨️ Keyboard OFF</button>
    <button id="shuffleBtn" onclick="toggleShuffle()">Shuffle OFF</button>
  </div>

  <!-- Actions -->
  <div class="controls-group">
    <button onclick="toggleCustomWord()" id="starBtn" class="icon">⭐</button>
    <button onclick="toggleDone()" class="primary">Mark as Done</button>
    <button onclick="clearCustomSet()">🧹 Clear</button>
  </div>

  <!-- Auto -->
  <div class="controls-group">
    <div class="auto-wrapper">
      <button id="autoBtn" onclick="toggleAutoMenu()">⏱ Auto OFF</button>

      <div id="autoMenu" class="auto-menu hidden">
        <!-- генерится через JS -->
      </div>
    </div>
  </div>

  <!-- Counter -->
  <div class="counter" id="counter"></div>

  <!-- Custom Sets -->
  <div id="customSetsPanel"></div>

</div>

<script>
let sets = [];
let currentSet = 0;
let current = 0;
let flipped = false;
let shuffle = false;
let order = [];
let customSets = JSON.parse(localStorage.getItem("customSets") || "[]");
let isAnswerCorrect = false;
let autoPlay = false;
let autoPlayInterval = null;
let autoPlayDelay = 3; // по умолчанию 3 секунды


async function loadData() {
  const res = await fetch("words.json");
  const data = await res.json();

  let globalId = 1;

  sets = data.sets.map(set => ({
    ...set,
    words: set.words.map(word => ({
      ...word,
      id: globalId++
    }))
  }));

  loadProgress();

  initOrder();         // 🔥 сначала логика
  renderSets();        
  render();

  updateShuffleUI();
  updateFilterUI();
  renderCustomSets();
  renderAutoMenu();
}

function renderSets() {
  const container = document.getElementById("sets");
  container.innerHTML = "";

  sets.forEach((set, index) => {
    const isDone = completedSets.includes(set.id);

    // фильтр
    if (filterMode === "notDone" && isDone) return;

    const btn = document.createElement("button");
    btn.innerText = set.id;

    if (index === currentSet) {
      btn.classList.add("active");
    }

    if (isDone) {
      btn.classList.add("done");
    }

    btn.onclick = () => selectSet(index);
    container.appendChild(btn);
  });

  updateProgress();
}

function selectSet(index) {
  currentSet = index;
  current = 0;
  flipped = false;

  // 🔥 ВАЖНО — выходим из custom режима
  filterMode = "all";
  currentCustomSet = null;

  initOrder();
  renderSets();
  render();

  document.getElementById("sets").classList.remove("open");
}

function getWords() {
  // 🔥 CUSTOM режим — собираем слова из ВСЕХ сетов
   if (
   filterMode === "custom" &&
   currentCustomSet !== null &&
   customSets[currentCustomSet]
 ) {
   const allWords = sets.flatMap(set => set.words);

   return allWords.filter(w =>
     customSets[currentCustomSet].words.includes(w.id)
   );
 }

  return sets[currentSet].words;
}

function removeFromCustomSet(wordObj) {
  const wordId = wordObj.id;

  customSets[currentCustomSet].words =
    customSets[currentCustomSet].words.filter(id => id !== wordId);

  localStorage.setItem("customSets", JSON.stringify(customSets));

  // если сет стал пустым — можно сразу обновить
  if (customSets[currentCustomSet].words.length === 0) {
    customSets.splice(currentCustomSet, 1);
    currentCustomSet = null;
    filterMode = "all";
  }

  initOrder();
  render();
  renderCustomSets();
}

function initOrder() {
  const words = getWords();
  order = words.map((_, i) => i);

  if (shuffle) {
    order.sort(() => Math.random() - 0.5);
  }
}

function render() {
  if (!sets.length) return;

  const words = getWords();
  

  if (!words.length) {
  document.getElementById("front").innerText = "No words";
  document.getElementById("back").innerText = "";
  return;
}

const word = words[order[current]];

  if (mode === "en-ru") {
    document.getElementById("front").innerText = word.en;
    document.getElementById("back").innerText =
      word.ru + " / " + word.uk;
  } else {
    document.getElementById("front").innerText =
      word.ru + " / " + word.uk;
    document.getElementById("back").innerText = word.en;
  }

  document.getElementById("cardInner").classList.remove("flipped");
  flipped = false;

  document.getElementById("counter").innerText =
    `Карточка ${current + 1} / ${order.length}`;

  document.getElementById("result").innerText = "";
  document.getElementById("answerInput").value = "";

  isAnswerCorrect = false;

  const wordObj = words[order[current]];
  const starBtn = document.getElementById("starBtn");

  if (isWordInCustom(wordObj.id)) {
    starBtn.innerText = "⭐"; // можно сделать "⭐ Added"
  } else {
    starBtn.innerText = "☆"; // пустая звезда
}
}

function clearCustomSet() {
  if (currentCustomSet === null) {
    alert("Open a custom set first");
    return;
  }

  // очищаем текущий сет
  customSets[currentCustomSet].words = [];

  // 🔥 УДАЛЯЕМ пустые сеты
  customSets = customSets.filter(set => set.words.length > 0);

  // 🔥 сбрасываем текущий индекс (он мог стать невалидным)
  currentCustomSet = null;
  filterMode = "all";

  // сохраняем
  localStorage.setItem("customSets", JSON.stringify(customSets));

  // обновляем порядок и UI
  initOrder();
  render();
  renderCustomSets();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById("cardInner").classList.toggle("flipped");
}

function nextWord() {
  if (!order.length) return;
  current = (current + 1) % order.length;
  render();
}

function prevWord() {
  if (!order.length) return;
  current = (current - 1 + order.length) % order.length;
  render();
}

function toggleShuffle() {
  shuffle = !shuffle;
  current = 0;

  initOrder();
  updateShuffleUI();
  render();
}

function updateShuffleUI() {
  const btn = document.getElementById("shuffleBtn");

  if (shuffle) {
    btn.classList.add("active");
    btn.innerText = "Shuffle ON";
  } else {
    btn.classList.remove("active");
    btn.innerText = "Shuffle OFF";
  }
}

// свайпы
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX - startX > 50) prevWord();
  else if (startX - endX > 50) nextWord();
});

let completedSets = [];

function loadProgress() {
  const saved = localStorage.getItem("completedSets");
  if (saved) {
    completedSets = JSON.parse(saved);
  }
}

function saveProgress() {
  localStorage.setItem("completedSets", JSON.stringify(completedSets));
}

function toggleDone() {
  const setId = sets[currentSet].id;

  if (completedSets.includes(setId)) {
    completedSets = completedSets.filter(id => id !== setId);
  } else {
    completedSets.push(setId);
  }

  saveProgress();
  renderSets();
}

let filterMode = "all";

function setFilter(mode) {
  filterMode = mode;
  renderSets();
  updateFilterUI();
}

function updateFilterUI() {
  document.getElementById("filterAll").classList.toggle("active", filterMode === "all");
  document.getElementById("filterNotDone").classList.toggle("active", filterMode === "notDone");
}

function updateProgress() {
  const total = sets.length;
  const done = completedSets.length;

  document.getElementById("progress").innerText =
    `Пройдено: ${done} / ${total}`;
}

let mode = "en-ru"; // или "ru-en"
let keyboardMode = false;

function toggleMode() {
  mode = mode === "en-ru" ? "ru-en" : "en-ru";

  document.getElementById("modeBtn").innerText =
    mode === "en-ru" ? "Mode: EN → RU" : "Mode: RU → EN";

  // 👉 если уходим из ru-en — выключаем keyboard
  if (mode === "en-ru" && keyboardMode) {
    keyboardMode = false;

    document.getElementById("keyboardBtn").innerText = "⌨️ Keyboard OFF";
    document.getElementById("inputArea").style.display = "none";
    document.getElementById("result").innerText = "";
  }

  render();
}

function toggleKeyboard() {
  if (mode !== "ru-en") {
    alert("Switch to RU → EN mode for typing");
    return;
  }

  keyboardMode = !keyboardMode;

  document.getElementById("keyboardBtn").innerText =
    keyboardMode ? "⌨️ Keyboard ON" : "⌨️ Keyboard OFF";

  document.getElementById("inputArea").style.display =
    keyboardMode ? "block" : "none";

  document.getElementById("result").innerText = "";
}

function checkAnswer() {
  const words = getWords();
  const word = words[order[current]];

  const input = document
    .getElementById("answerInput")
    .value
    .trim()
    .toLowerCase();

  let correctAnswer = word.en.toLowerCase();

  const result = document.getElementById("result");

  if (input === correctAnswer) {
    isAnswerCorrect = true;
    result.innerText = "Correct!";
    result.className = "result correct";
  } else {
    isAnswerCorrect = false;
    result.innerText = `Wrong! Correct: ${correctAnswer}`;
    result.className = "result wrong";
  }
}

function toggleMenu() {
  document.getElementById("sets").classList.toggle("open");
}

function renderCustomSets() {
  const container = document.getElementById("customSetsPanel");
  container.innerHTML = "";

  customSets.forEach((set, index) => {
  const btn = document.createElement("button");

  btn.textContent = `⭐ Review ${index + 1} (${set.words.length})`;

  if (index === currentCustomSet && filterMode === "custom") {
    btn.classList.add("active");
  }

  btn.onclick = () => {
  filterMode = "custom";
  currentCustomSet = index;

  current = 0;
  initOrder();

  render();
  renderCustomSets();

  window.scrollTo({ top: 0, behavior: "smooth" });
};

  container.appendChild(btn);
});
}

let currentCustomSet = null;

function openCustomSet(index) {
  currentCustomSet = index;
  filterMode = "custom";
  current = 0;

  initOrder();
  renderSets(); // ← добавить
  render();
}

function isWordInCustom(wordId) {
  return customSets.some(set =>
    set.words.includes(wordId)
  );
}

function toggleCustomWord() {
  const wordObj = getWords()[order[current]];
  const wordId = wordObj.id;

  if (isWordInCustom(wordId)) {
    customSets.forEach(set => {
      set.words = set.words.filter(id => id !== wordId);
    });

    customSets = customSets.filter(set => set.words.length > 0);

    localStorage.setItem("customSets", JSON.stringify(customSets));

    initOrder();
    render();
    renderCustomSets();
    return;
  }

  if (customSets.length === 0) {
    customSets.push({ id: 1, words: [] });
  }

  let targetSet = customSets.find(set => set.words.length < 50);

  if (!targetSet) {
    targetSet = {
      id: customSets.length + 1,
      words: []
    };
    customSets.push(targetSet);
  }

  targetSet.words.push(wordId);

  localStorage.setItem("customSets", JSON.stringify(customSets));
  renderCustomSets();
  render();
}

function startAutoPlay() {
  if (autoPlayInterval) clearInterval(autoPlayInterval);

  autoPlayInterval = setInterval(() => {
    nextWord();
  }, autoPlayDelay * 1000);
}

function stopAutoPlay() {
  clearInterval(autoPlayInterval);
  autoPlayInterval = null;
}

function toggleAutoPlay() {
  autoPlay = !autoPlay;

  if (autoPlay) {
    startAutoPlay();   // ▶ запускаем таймер
  } else {
    stopAutoPlay();    // ⏹ останавливаем
  }

  updateAutoBtn();     // 🔄 обновляем текст кнопки
}

function changeAutoDelay(value) {
  autoPlayDelay = Number(value);

  if (autoPlay) {
    startAutoPlay(); // перезапускаем с новым временем
  }

  const btn = document.getElementById("autoBtn");
  if (autoPlay) {
    btn.innerText = `⏱ Auto ${autoPlayDelay}s`;
  }
}

function renderAutoMenu() {
  const menu = document.getElementById("autoMenu");
  menu.innerHTML = "";

  // 🔴 КНОПКА OFF
  const offBtn = document.createElement("button");
  offBtn.innerText = "OFF";

  offBtn.onclick = () => {
    autoPlay = false;
    stopAutoPlay();
    updateAutoBtn();
    menu.classList.add("hidden");
  };

  menu.appendChild(offBtn);

  // ⏱ КНОПКИ 1–10
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.innerText = `${i}s`;

    btn.onclick = () => {
      autoPlay = true;
      autoPlayDelay = i;
      startAutoPlay();
      updateAutoBtn();
      menu.classList.add("hidden");
    };

    menu.appendChild(btn);
  }
}

function toggleAutoMenu() {
  const menu = document.getElementById("autoMenu");
  menu.classList.toggle("hidden");
}

function updateAutoBtn() {
  const btn = document.getElementById("autoBtn");

  if (autoPlay) {
    btn.innerText = `⏱ Auto ${autoPlayDelay}s`;
    btn.classList.add("active");
  } else {
    btn.innerText = "⏱ Auto OFF";
    btn.classList.remove("active");
  }
}

loadData();
updateShuffleUI();

document.addEventListener("keydown", (e) => {
  const activeEl = document.activeElement;
  const tag = activeEl.tagName;

  const isTyping =
    tag === "INPUT" ||
    tag === "TEXTAREA" ||
    activeEl.isContentEditable;

  // ← →
  if (e.code === "ArrowRight") nextWord();
  if (e.code === "ArrowLeft") prevWord();

  // ПРОБЕЛ
  if (e.code === "Space" && !isTyping) {
    e.preventDefault();
    flipCard();
  }

  // ENTER
  if (e.code === "Enter") {
    if (!isTyping) return;

    e.preventDefault();

    if (!isAnswerCorrect) {
      checkAnswer();
    } else {
      nextWord();
      isAnswerCorrect = false;
    }
  }
});
</script>

</body>
</html>
