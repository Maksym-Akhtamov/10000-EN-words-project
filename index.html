<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Cards</title>

  <style>
/* ===== 1. БАЗОВЫЕ СТИЛИ И СЕТКА ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #121212;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
}

.app-grid {
  display: grid;
  grid-template-columns: 250px 1fr 200px; /* Сеты | Центр | Управление */
  gap: 30px;
  max-width: 1200px;
  width: 100%;
  padding: 40px 20px;
  align-items: start;
}

/* ===== 2. БОКОВЫЕ ПАНЕЛИ ===== */
.sidebar-left, .sidebar-right {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#sets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #333;
}

.side-controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-start;
  height: 280px; /* Высота совпадает с карточкой */
  justify-content: center;
  margin-top: 50px;
}

/* ===== 3. ЦЕНТРАЛЬНЫЙ БЛОК И КАРТОЧКА ===== */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

#counter {
  font-size: 14px;
  color: #888;
}

.card-container {
  width: 100%;
  max-width: 500px;
  position: relative;
}

.card {
  width: 100%;
  height: 280px;
  perspective: 1000px;
  cursor: pointer;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.flipped { transform: rotateY(180deg); }

.side {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #252525;
  border-radius: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: 500;
  padding: 30px;
  box-sizing: border-box;
  backface-visibility: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: 1px solid #333;
  text-align: center;
}

.back {
  transform: rotateY(180deg);
  background: #1b4d2e;
  border-color: #2e7d32;
}

.card-icon {
  position: absolute;
  top: 15px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: #888;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
}

.card-icon:hover { background: rgba(255,255,255,0.15); color: #fff; }
.star { right: 15px; font-size: 20px; }
.audio { left: 15px; font-size: 20px; }

/* ===== 4. ПОЛЕ ВВОДА (INPUT GROUP) ===== */
#inputArea {
  width: 100%;
  max-width: 500px;
  display: none; /* Включается через JS (display: flex) */
  justify-content: center;
  margin-top: 10px;
}

.input-group {
  display: flex;
  width: 100%;
  gap: 10px;
  align-items: center;
}

#answerInput {
  flex: 1;
  background: #1e1e1e;
  border: 1px solid #444;
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 18px;
  outline: none;
  transition: border-color 0.3s;
  text-align: center;
}

#answerInput:focus { border-color: #1976d2; }

#checkBtn {
  background: #1976d2;
  color: white;
  padding: 0 25px;
  border-radius: 12px;
  font-weight: bold;
  height: 48px; /* Совпадает с инпутом */
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}

#checkBtn:hover { background: #1565c0; }

/* ===== 5. КАСТОМНЫЕ ДРОПДАУНЫ ===== */
.custom-dropdown {
  position: relative;
  width: 100%;
  max-width: 300px;
  user-select: none;
}

.dropdown-selected {
  background: #2c2c2c;
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid #444;
  cursor: pointer;
  position: relative;
  transition: all 0.3s ease;
}

.dropdown-selected::after {
  content: '▼';
  position: absolute;
  right: 15px;
  font-size: 10px;
  color: #888;
  transition: transform 0.3s ease;
}

.custom-dropdown.open .dropdown-selected::after { transform: rotate(180deg); }

.dropdown-options {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  width: 100%;
  background: #2c2c2c;
  border-radius: 12px;
  border: 1px solid #444;
  overflow: hidden;
  visibility: hidden;
  opacity: 0;
  transform: translateY(-10px) scale(0.98);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  z-index: 2000;
  pointer-events: none;
}

.custom-dropdown.open .dropdown-options {
  visibility: visible;
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.option { padding: 12px 20px; cursor: pointer; }
.option:hover { background: #3d3d3d; color: #fff; }

.auto-wrapper { display: flex; gap: 8px; width: 100%; position: relative; }
#autoBtn { flex: 1; z-index: 1; }
.custom-dropdown.mini { width: 75px; flex-shrink: 0; }
.mini-selected { padding: 10px 5px !important; text-align: center; font-size: 13px !important; border-radius: 8px !important; }
.mini-selected::after { right: 8px !important; }

/* ===== 6. КНОПКИ И НАВИГАЦИЯ ===== */
button {
  background: #2c2c2c;
  color: #bbb;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { background: #3d3d3d; color: #fff; }
button.active { background: #1976d2; color: white; }

.nav-arrows { display: flex; gap: 20px; }
.nav-btn { width: 60px; height: 60px; font-size: 24px; border-radius: 50%; }

.btn-clear {
  background: #442222 !important;
  color: #ffaaaa !important;
  border: 1px solid #663333 !important;
  width: 100% !important;
  display: none;
  margin-top: 10px;
}

#testOptions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 500px;
}

/* ===== 7. МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
@media (max-width: 900px) {
  .app-grid {
    grid-template-columns: 1fr;
    padding: 15px;
    gap: 20px;
    overflow: visible;
  }

  .main-content { order: 1; width: 100%; }
  .sidebar-right { order: 2; width: 100%; margin-top: 0; height: auto; }
  .sidebar-left { order: 3; width: 100%; }

  .custom-dropdown { max-width: 100%; }
  
  .input-group {
    flex-direction: column; /* Поле ввода и кнопка Check друг под другом */
    align-items: center;
  }
  
  #answerInput { width: 100%; box-sizing: border-box; }
  #checkBtn { width: 100%; }

  .side-controls {
    flex-direction: row;
    flex-wrap: wrap;
    height: auto;
    width: 100%;
    gap: 10px;
  }

  #shuffleBtn { flex: 1; min-width: 140px; }
  .auto-wrapper { flex: 1.5; min-width: 180px; }
  
  .card { height: 240px; }
  .side { font-size: 26px; }

  #sets { grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); }
}
</style>
</head>

<body>

<div class="app-grid">
  <aside class="sidebar-left">
    <button id="menuBtn" onclick="toggleMenu()">📚 Sets</button>
    <div id="sets"></div>
    
    <div class="custom-dropdown" id="modeDropdown">
  <div class="dropdown-selected" onclick="toggleDropdown()">Study Mode</div>
  <div class="dropdown-options" id="dropdownOptions">
    <div class="option" onclick="selectNewMode('study')">Study Mode</div>
    <div class="option" onclick="selectNewMode('choice')">Choice Mode</div>
    <div class="option" onclick="selectNewMode('audio')">Audio Mode</div>
    <div class="option" onclick="selectNewMode('ai')">AI Mode</div>
  </div>
</div>
    
    <div id="customSetsPanel"></div>
  </aside>

  <main class="main-content">
    <div id="counter" class="counter"></div>

    <div class="card-container">
      <div class="card" onclick="flipCard()">
        <button id="starBtn" class="card-icon star" onclick="event.stopPropagation(); toggleCustomWord()">☆</button>
        <button id="speakBtn" class="card-icon audio" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
        
        <div id="cardInner" class="inner">
          <div class="side" id="front"></div>
          <div class="side back" id="back"></div>
        </div>
      </div>
    </div>

    <div id="inputArea" style="display: none; width: 100%; max-width: 400px;">
  <div class="input-group">
    <input type="text" id="answerInput" placeholder="Type translation..." onkeydown="if(event.key==='Enter') checkAnswer()" />
    <button id="checkBtn" onclick="checkAnswer()">Check</button>
  </div>
</div>
    
    <div id="testOptions" class="controls-group" style="display:none;"></div>
    <div id="result" class="result"></div>

    <div class="nav-arrows">
      <button class="nav-btn" onclick="prevWord()">←</button>
      <button class="nav-btn" onclick="nextWord()">→</button>
    </div>

    <div class="bottom-settings" id="bottomSettings">
      <button id="modeBtn" onclick="toggleMode()">Mode: EN</button>
      <button id="keyboardBtn" onclick="toggleKeyboard()">⌨️ Keyboard OFF</button>
    </div>
  </main>

  <aside class="sidebar-right">
  <div class="side-controls">
    <button id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle OFF</button>
    
    <div class="auto-wrapper">
      <button id="autoBtn" onclick="toggleAutoPlay()">▶ Auto OFF</button>
      <div class="custom-dropdown mini" id="autoDropdown">
        <div class="dropdown-selected mini-selected" onclick="toggleAutoDropdown()">3s</div>
        <div class="dropdown-options mini-options">
          <div class="option" onclick="selectAutoTime(1)">1s</div>
          <div class="option" onclick="selectAutoTime(2)">2s</div>
          <div class="option" onclick="selectAutoTime(3)">3s</div>
          <div class="option" onclick="selectAutoTime(5)">5s</div>
        </div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearCustomSet()">🧹 Clear</button>
    <button id="regenBtn" style="display:none;" onclick="regenerateAI()">🔄 Regenerate AI</button>

  </div>
</aside>
</div>

<div id="progress" style="display:none;"></div>
<div id="filterGroup" style="display:none;">
  <button id="filterAll"></button>
  <button id="filterNotDone"></button>
</div>

<script>
// API key is stored securely on the server (Vercel env variable)
let sets = [];
let currentSet = 0;
let current = 0;
let flipped = false;
let shuffle = false;
let order = [];
let customSets = JSON.parse(localStorage.getItem("customSets") || "[]");
let isAnswerCorrect = false;
let autoPlay = false;
let autoPlayInterval = null;
let autoPlayDelay = 3; // по умолчанию 3 секунды
let testMode = false;
let audioMode = false;
let aiMode = false;
let aiTasksCache = {};
let aiTasks = [];


async function loadData() {
  const res = await fetch("words.json");
  const data = await res.json();

  let globalId = 1;

  sets = data.sets.map(set => ({
    ...set,
    words: set.words.map(word => ({
      ...word,
      id: globalId++
    }))
  }));

  loadProgress();

  initOrder();         // 🔥 сначала логика
  renderSets();        
  render();

  updateShuffleUI();
  updateFilterUI();
  renderCustomSets();
  updateUIVisibility();
}

function renderSets() {
  const container = document.getElementById("sets");
  container.innerHTML = "";

  sets.forEach((set, index) => {
    const isDone = completedSets.includes(set.id);

    // фильтр
    if (filterMode === "notDone" && isDone) return;

    const btn = document.createElement("button");
    btn.innerText = set.id;

    if (index === currentSet) {
      btn.classList.add("active");
    }

    if (isDone) {
      btn.classList.add("done");
    }

    btn.onclick = () => selectSet(index);
    container.appendChild(btn);
  });
}

function selectSet(index) {
  currentSet = index;
  current = 0;
  flipped = false;

  // 🔥 ВАЖНО — выходим из custom режима
  filterMode = "all";
  currentCustomSet = null;

  // Load AI tasks for new set from cache (or reset to empty)
  if (aiMode) {
    const cached = loadAITasksFromCache();
    aiTasks = cached || [];
  }

  initOrder();
  renderSets();
  render();
  updateUIVisibility();

  document.getElementById("sets").classList.remove("open");
}

function getWords() {
  // 🔥 CUSTOM режим — собираем слова из ВСЕХ сетов
   if (
   filterMode === "custom" &&
   currentCustomSet !== null &&
   customSets[currentCustomSet]
 ) {
   const allWords = sets.flatMap(set => set.words);

   return allWords.filter(w =>
     customSets[currentCustomSet].words.includes(w.id)
   );
 }

  return sets[currentSet].words;
}

function removeFromCustomSet(wordObj) {
  const wordId = wordObj.id;

  customSets[currentCustomSet].words =
    customSets[currentCustomSet].words.filter(id => id !== wordId);

  localStorage.setItem("customSets", JSON.stringify(customSets));

  // если сет стал пустым — можно сразу обновить
  if (customSets[currentCustomSet].words.length === 0) {
    customSets.splice(currentCustomSet, 1);
    currentCustomSet = null;
    filterMode = "all";
  }

  initOrder();
  render();
  renderCustomSets();
}

function initOrder() {
  const words = getWords();
  order = words.map((_, i) => i);

  if (shuffle) {
    order.sort(() => Math.random() - 0.5);
  }
}

function switchMode(selectedMode) {
  testMode = false;
  audioMode = false;
  aiMode = false;
  
  if (selectedMode === "choice") {
    testMode = true;
  } else if (selectedMode === "audio") {
    audioMode = true;
  } else if (selectedMode === "ai") {
    aiMode = true;
    loadAITasks();
  }
  
  if (selectedMode !== "study" || mode !== "ru-en") {
    keyboardMode = false;
    const kbBtn = document.getElementById("keyboardBtn");
    if (kbBtn) kbBtn.innerText = "⌨️ Keyboard OFF";
  }

  // Обновляем видимость UI после смены мода
  updateUIVisibility();
  render();
}

function updateUIVisibility() {
  const testOptions = document.getElementById("testOptions");
  const inputArea = document.getElementById("inputArea");
  const clearBtn = document.querySelector(".btn-clear");

  if (testOptions) testOptions.style.display = (testMode || aiMode) ? "grid" : "none";
  if (inputArea) inputArea.style.display = (audioMode || keyboardMode) ? "block" : "none";

  // Кнопка Clear: показываем, если выбран кастомный сет (Review)
  if (clearBtn) {
    if (filterMode === "custom" || currentCustomSet !== null) {
      clearBtn.style.display = "block";
    } else {
      clearBtn.style.display = "none";
    }
  }

  if (aiMode) {
    testOptions.style.display = "grid";
  }

  const bottomSettings = document.getElementById("bottomSettings");
if (bottomSettings) bottomSettings.style.display = (aiMode || audioMode || testMode) ? "none" : "";

  const regenBtn = document.getElementById("regenBtn");
  if (regenBtn) regenBtn.style.display = aiMode ? "block" : "none";

  const speakBtn = document.getElementById("speakBtn");
  if (speakBtn) speakBtn.style.display = aiMode ? "none" : "";

  const modeSelect = document.getElementById("modeSelect");
  if (modeSelect) {
    if (testMode) modeSelect.value = "choice";
    else if (audioMode) modeSelect.value = "audio";
    else modeSelect.value = "study";
  }
}

function clearCustomSet() {
  if (currentCustomSet === null) return;

  if (!confirm("Delete all words from this Review set?")) return;

  customSets[currentCustomSet].words = [];
  // Оставляем пустой сет или удаляем его - на твое усмотрение. 
  // Если хочешь, чтобы он исчез совсем:
  customSets = customSets.filter(set => set.words.length > 0);

  currentCustomSet = null;
  filterMode = "all";

  localStorage.setItem("customSets", JSON.stringify(customSets));

  initOrder();
  render();
  renderCustomSets();
  updateUIVisibility(); 
}

function flipCard() {
  if (testMode) return;

  flipped = !flipped;
  document.getElementById("cardInner").classList.toggle("flipped");
}

function nextWord() {
  if (!order.length) return;
  current = (current + 1) % order.length;
  render();

  const input = document.getElementById("answerInput");
  if (input) {
  input.value = "";
  input.focus();
}
}

function prevWord() {
  if (!order.length) return;
  current = (current - 1 + order.length) % order.length;
  render();
}

function toggleShuffle() {
  shuffle = !shuffle;
  current = 0;

  initOrder();
  updateShuffleUI();
  render();
}

function updateShuffleUI() {
  const btn = document.getElementById("shuffleBtn");

  if (shuffle) {
    btn.classList.add("active");
    btn.innerText = "Shuffle ON";
  } else {
    btn.classList.remove("active");
    btn.innerText = "Shuffle OFF";
  }
}

// свайпы
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX - startX > 50) prevWord();
  else if (startX - endX > 50) nextWord();
});

let completedSets = [];

function loadProgress() {
  const saved = localStorage.getItem("completedSets");
  if (saved) {
    completedSets = JSON.parse(saved);
  }
}

function saveProgress() {
  localStorage.setItem("completedSets", JSON.stringify(completedSets));
}

function toggleDone() {
  const setId = sets[currentSet].id;

  if (completedSets.includes(setId)) {
    completedSets = completedSets.filter(id => id !== setId);
  } else {
    completedSets.push(setId);
  }

  saveProgress();
  renderSets();
}

let filterMode = "all";

function setFilter(mode) {
  filterMode = mode;
  renderSets();
  updateFilterUI();
}

function updateFilterUI() {
  document.getElementById("filterAll").classList.toggle("active", filterMode === "all");
  document.getElementById("filterNotDone").classList.toggle("active", filterMode === "notDone");
}


let mode = "en-ru"; // en-ru | ru-en
let keyboardMode = false;

function toggleMode() {
  if (mode === "en-ru") mode = "ru-en";
  else if (mode === "ru-en") mode = "en-ru";
  else mode = "en-ru";

  document.getElementById("modeBtn").innerText =
    mode === "en-ru" ? "Mode: EN" :
    mode === "ru-en" ? "Mode: Translations" :
    "Mode: Test";

  // выключаем клавиатуру в test режиме
  if (mode !== "ru-en") {
    keyboardMode = false;
    document.getElementById("keyboardBtn").innerText = "⌨️ Keyboard OFF";
    document.getElementById("inputArea").style.display = "none";
  }

  render();
}

function toggleKeyboard() {
  if (mode !== "ru-en") {
    alert("Switch to Mode: Translations for typing");
    return;
  }

  keyboardMode = !keyboardMode;

  document.getElementById("keyboardBtn").innerText =
    keyboardMode ? "⌨️ Keyboard ON" : "⌨️ Keyboard OFF";

  document.getElementById("inputArea").style.display =
    keyboardMode ? "block" : "none";

  document.getElementById("result").innerText = "";
}

function checkAnswer() {
  const input = document.getElementById("answerInput").value.trim().toLowerCase();
  const words = getWords();
  const correct = words[order[current]].en.toLowerCase();

  const result = document.getElementById("result");

  if (input === correct) {
    result.innerText = "✅ Correct!";
    result.style.color = "lightgreen";

    if (!autoPlay) setTimeout(() => {
      nextWord();
    }, 800); // ⬅️ чуть больше времени

  } else {
    result.innerText = `❌ ${correct}`;
    result.style.color = "tomato";
  }
}

function toggleMenu() {
  document.getElementById("sets").classList.toggle("open");
}

function renderCustomSets() {
  const container = document.getElementById("customSetsPanel");
  container.innerHTML = "";

  customSets.forEach((set, index) => {
  const btn = document.createElement("button");

  btn.textContent = `⭐ Review ${index + 1} (${set.words.length})`;

  if (index === currentCustomSet && filterMode === "custom") {
    btn.classList.add("active");
  }

  btn.onclick = () => {
  filterMode = "custom";
  currentCustomSet = index;

  current = 0;
  initOrder();

  render();
  renderCustomSets();
  updateUIVisibility();

  window.scrollTo({ top: 0, behavior: "smooth" });
};

  container.appendChild(btn);
});
}

let currentCustomSet = null;

function openCustomSet(index) {
  currentCustomSet = index;
  filterMode = "custom";
  current = 0;

  initOrder();
  renderSets(); // ← добавить
  render();
}

function isWordInCustom(wordId) {
  return customSets.some(set =>
    set.words.includes(wordId)
  );
}

function toggleCustomWord() {
  const wordObj = getWords()[order[current]];
  const wordId = wordObj.id;

  if (isWordInCustom(wordId)) {
    customSets.forEach(set => {
      set.words = set.words.filter(id => id !== wordId);
    });

    customSets = customSets.filter(set => set.words.length > 0);

    localStorage.setItem("customSets", JSON.stringify(customSets));

    initOrder();
    render();
    renderCustomSets();
    return;
  }

  if (customSets.length === 0) {
    customSets.push({ id: 1, words: [] });
  }

  let targetSet = customSets.find(set => set.words.length < 50);

  if (!targetSet) {
    targetSet = {
      id: customSets.length + 1,
      words: []
    };
    customSets.push(targetSet);
  }

  targetSet.words.push(wordId);

  localStorage.setItem("customSets", JSON.stringify(customSets));
  renderCustomSets();
  render();
}

function startAutoPlay() {
  if (autoPlayInterval) clearInterval(autoPlayInterval);

  autoPlayInterval = setInterval(() => {
    nextWord();
  }, autoPlayDelay * 1000);
}

function stopAutoPlay() {
  clearInterval(autoPlayInterval);
  autoPlayInterval = null;
}

function toggleAutoPlay() {
  autoPlay = !autoPlay;

  if (autoPlay) {
    startAutoPlay();   // ▶ запускаем таймер
  } else {
    stopAutoPlay();    // ⏹ останавливаем
  }

  updateAutoBtn();     // 🔄 обновляем текст кнопки
}

function changeAutoDelay(value) {
  autoPlayDelay = Number(value);

  if (autoPlay) {
    startAutoPlay(); // перезапускаем с новым временем
  }

  const btn = document.getElementById("autoBtn");
  if (autoPlay) {
    btn.innerText = `▶ Auto ${autoPlayDelay}s`;
  }
}

function renderAutoMenu() {
  const menu = document.getElementById("autoMenu");
  menu.innerHTML = "";

  // 🔴 КНОПКА OFF
  const offBtn = document.createElement("button");
  offBtn.innerText = "OFF";

  offBtn.onclick = () => {
    autoPlay = false;
    stopAutoPlay();
    updateAutoBtn();
    menu.classList.add("hidden");
  };

  menu.appendChild(offBtn);

  // КНОПКИ 1–10
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.innerText = `${i}s`;

    btn.onclick = () => {
      autoPlay = true;
      autoPlayDelay = i;
      startAutoPlay();
      updateAutoBtn();
      menu.classList.add("hidden");
    };

    menu.appendChild(btn);
  }
}

function toggleAutoMenu() {
  const menu = document.getElementById("autoMenu");
  menu.classList.toggle("hidden");
}

function updateAutoBtn() {
  const btn = document.getElementById("autoBtn");

  if (autoPlay) {
    btn.innerText = `▶ Auto ${autoPlayDelay}s`;
    btn.classList.add("active");
  } else {
    btn.innerText = "▶ Auto OFF";
    btn.classList.remove("active");
  }
}

function generateOptions(correctWord, words) {
  const pool = words.map(w => w.en).filter(w => w !== correctWord.en);

  const shuffled = pool.sort(() => Math.random() - 0.5);

  const options = [correctWord.en, ...shuffled.slice(0, 3)];

  return options.sort(() => Math.random() - 0.5);
}

function selectOption(selected, correct) {
  if (isAnswerCorrect) return; // 🚫 блок повторных кликов

  const result = document.getElementById("result");

  if (selected === correct) {
    result.innerText = "Correct!";
    result.className = "result correct";
    isAnswerCorrect = true;

    if (!autoPlay) setTimeout(() => nextWord(), 600);
  } else {
    result.innerText = `Wrong! Correct: ${correct}`;
    result.className = "result wrong";
    isAnswerCorrect = true; // 👈 тоже блокируем
  }
}

function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  utterance.lang = "en-US"; // можно en-GB
  utterance.rate = 0.9;

  speechSynthesis.cancel(); // стоп предыдущего
  speechSynthesis.speak(utterance);
}

function speakCurrent() {
  const words = getWords();
  const word = words[order[current]];

  speak(word.en);
}

function render() {

  document.getElementById("result").innerText = "";
  isAnswerCorrect = false;

  const words = getWords();
  if (!words.length) {
    document.getElementById("front").innerText = "No words";
    document.getElementById("back").innerText = "";
    return;
  }

  const word = words[order[current]];

  // Логика Audio Mode
  if (audioMode) {
    document.getElementById("front").innerText = "🔊 Listen...";
    document.getElementById("back").innerText = "";
    setTimeout(() => speak(word.en), 300);

    } else if (aiMode) {

  const front = document.getElementById("front");
  const back = document.getElementById("back");
  const aiContainer = document.getElementById("testOptions");

  // null = loading; [] = no cache yet
  if (aiTasks === null) {
    front.innerText = '\u23f3 Generating...';
    back.innerHTML = '';
    aiContainer.innerHTML = '';
    return;
  }
  if (aiTasks.length === 0) {
    front.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:16px"><div style="color:#aaa;font-size:18px">No AI tasks for this set</div><button onclick="event.stopPropagation();startAIGeneration()" style="background:#1976d2;color:white;padding:12px 28px;border-radius:12px;font-size:16px;font-weight:bold;border:none;cursor:pointer;">\u26a1 Generate AI</button></div>';
    back.innerHTML = '';
    aiContainer.innerHTML = '';
    return;
  }

  const wordEn = getWords()[order[current]].en;
  const setId = sets[currentSet].id;
  const task = aiTasks.find(t => t.word === wordEn && t.setId === setId);

  if (!task) {
    front.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:16px"><div style="color:#aaa;font-size:18px">No AI tasks for this set</div><button onclick="event.stopPropagation();startAIGeneration()" style="background:#1976d2;color:white;padding:12px 28px;border-radius:12px;font-size:16px;font-weight:bold;border:none;cursor:pointer;">&#x26A1; Generate AI</button></div>';
    back.innerHTML = '';
    aiContainer.innerHTML = '';
    return;
  }

  front.innerText = task.sentence;
  back.innerHTML = "";

  aiContainer.innerHTML = "";
  aiContainer.style.display = "grid";
  const shuffledOpts = [...task.options].sort(() => Math.random() - 0.5);
  shuffledOpts.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => selectAIOption(opt, task.correct);
    aiContainer.appendChild(btn);
  });
} else if (testMode) {
    // Логика Choice Mode
    document.getElementById("front").innerText = word.ru + " / " + word.uk;
    document.getElementById("back").innerText = "";
    renderChoiceOptions(word, words); // вынесем это в подфункцию для чистоты
  } else {
    // Обычный режим
    if (mode === "en-ru") {
      document.getElementById("front").innerText = word.en;
      document.getElementById("back").innerText = word.ru + " / " + word.uk;
    } else {
      document.getElementById("front").innerText = word.ru + " / " + word.uk;
      document.getElementById("back").innerText = word.en;
    }
  }

  // Обновляем звезду
  const starBtn = document.getElementById("starBtn");
  starBtn.innerText = isWordInCustom(word.id) ? "⭐" : "☆";
  
  // Счетчик и очистка состояния
  document.getElementById("cardInner").classList.remove("flipped");
  flipped = false;
  document.getElementById("counter").innerText = `Карточка ${current + 1} / ${order.length}`;
  document.getElementById("result").innerText = "";
  if (!isTypingActive()) document.getElementById("answerInput").value = "";
  isAnswerCorrect = false;

  updateUIVisibility();
}

// Вспомогательная функция для Choice Mode
function renderChoiceOptions(word, words) {
  const container = document.getElementById("testOptions");
  container.innerHTML = "";
  const options = generateOptions(word, words);
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => selectOption(opt, word.en);
    container.appendChild(btn);
  });
}

function isTypingActive() {
  return document.activeElement === document.getElementById("answerInput");
}

function toggleDropdown() {
  document.getElementById("modeDropdown").classList.toggle("open");
}

function selectNewMode(modeKey) {
  // Закрываем список
  document.getElementById("modeDropdown").classList.remove("open");
  
  // Обновляем текст в шапке дропдауна
  const displayNames = {

// Закрытие дропдаунов, если кликнули мимо них

function toggleAutoDropdown() {

}

window.onclick = function(event) {
  if (!event.target.closest('.custom-dropdown')) {
    document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('open'));
  }
}

async function generateAITasks(words) {
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ words: words.map(w => w.en) })
  });

  if (!res.ok) {
    console.error("Server error:", res.status);
    alert("Server error " + res.status + ". Check console.");
    return [];
  }

  try {
    const parsed = await res.json();
    const setId = sets[currentSet].id;
    return parsed.map(t => ({ ...t, setId }));
  } catch (e) {
    console.error("Parse error:", e);
    alert("Failed to parse server response.");
    return [];
  }
}
function getAIStorageKey() {
  return 'aiTasks_set_' + sets[currentSet].id;
}

function loadAITasksFromCache() {
  const key = getAIStorageKey();
  if (aiTasksCache[key]) return aiTasksCache[key];
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      aiTasksCache[key] = parsed;
      return parsed;
    } catch(e) { return null; }
  }
  return null;
}

function saveAITasksToCache(tasks) {
  const key = getAIStorageKey();
  aiTasksCache[key] = tasks;
  localStorage.setItem(key, JSON.stringify(tasks));
}

async function startAIGeneration() {
  aiTasks = null; // null = loading state
  render();

  const words = getWords();
  const batchSize = 10;
  const batches = [];
  for (let i = 0; i < words.length; i += batchSize) {
    batches.push(words.slice(i, i + batchSize));
  }

  try {
    const results = await Promise.all(batches.map(batch => generateAITasks(batch)));
    const allTasks = results.flat();
    if (!allTasks.length) { aiTasks = []; render(); return; }
    saveAITasksToCache(allTasks);
    aiTasks = allTasks;
    render();
  } catch(e) {
    console.error('AI generation failed', e);
    aiTasks = [];
    render();
  }
}

async function loadAITasks() {
  const cached = loadAITasksFromCache();
  if (cached) {
    aiTasks = cached;
    render();
    return;
  }
  aiTasks = [];
  render();
}

function regenerateAI() {
  const key = getAIStorageKey();
  delete aiTasksCache[key];
  localStorage.removeItem(key);
  startAIGeneration();
}

function renderAIOptions(task) {
  const container = document.getElementById("testOptions");
  container.innerHTML = "";

  task.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => selectAIOption(opt, task.correct);
    container.appendChild(btn);
  });
}

function selectAIOption(selected, correct) {
  if (isAnswerCorrect) return;

  const result = document.getElementById("result");

  if (selected === correct) {
    result.innerText = "Correct!";
    result.style.color = "lightgreen";
  } else {
    result.innerText = `Wrong! (AI might be ambiguous)\nCorrect: ${correct}`;
    result.style.color = "tomato";
  }

  isAnswerCorrect = true;
  if (!autoPlay) setTimeout(() => nextWord(), 900);
}

loadData();
updateShuffleUI();

document.addEventListener("keydown", (e) => {
  const activeEl = document.activeElement;
  const tag = activeEl.tagName;

  const isTyping =
    tag === "INPUT" ||
    tag === "TEXTAREA" ||
    activeEl.isContentEditable;

  // ← →
  if (e.code === "ArrowRight") nextWord();
  if (e.code === "ArrowLeft") prevWord();

  // ПРОБЕЛ
  if (e.code === "Space" && !isTyping) {
    e.preventDefault();
    flipCard();
  }

  // ENTER
  if (e.code === "Enter") {
    if (!isTyping) return;

    e.preventDefault();

    if (!isAnswerCorrect) {
      checkAnswer();
    } else {
      nextWord();
      isAnswerCorrect = false;
    }
  }
});
